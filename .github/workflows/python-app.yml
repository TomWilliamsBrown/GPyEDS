# This workflow installs dependencies with uv, lints, and runs the test suite on Python 3.12.
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "main", "modernisation" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    env:
      # gpflow/gpflux/nn.py are Keras-2 code; TensorFlow >= 2.16 defaults to Keras 3.
      TF_USE_LEGACY_KERAS: "1"
      # Headless matplotlib backend for the plotting tests.
      MPLBACKEND: "Agg"

    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: "3.12"
    - name: Install the project and dependencies
      run: uv sync --extra tf --extra test
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        uv run flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        uv run flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      run: |
        uv run pytest --cov .
    - name: Upload coverage reports to Codecov
      continue-on-error: true
      uses: codecov/codecov-action@v4.0.1
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
